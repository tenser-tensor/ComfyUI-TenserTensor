# .github/ISSUE_TEMPLATE/feature_request.yml
name: Bug Report
description: File a bug report.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect to happen instead?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Load node ...
        2. Connect ...
        3. Run ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Node pack version
      placeholder: ex. 1.6.0
    validations:
      required: true
  - type: input
    id: comfy-version
    attributes:
      label: ComfyUI version
      placeholder: ex. 0.3.x
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Copy and paste any relevant log output.
      render: shell
    validations:
      required: false
  - type: upload
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
    validations:
      required: false
